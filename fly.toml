# Multiplayer relay — deploy: fly launch && fly deploy
# Then point mp.spacesalvagers.com CNAME to <app>.fly.dev
app = "space-salvagers-mp"
primary_region = "sjc"

[build]
  dockerfile = "server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"
